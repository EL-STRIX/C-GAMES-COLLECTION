name: CI Build and Package

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make pkg-config libgtk-4-dev xvfb

    - name: Build Project
      run: make all CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 $(pkg-config --cflags gtk4)"
      
    - name: Run Tests
      run: xvfb-run make test

  package-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-gtk4
          mingw-w64-ucrt-x86_64-pkgconf
          make
          zip

    - name: Build and Package (MSYS2)
      shell: msys2 {0}
      run: |
        # Use our packaging script natively in the MSYS2 bash environment
        bash scripts/package-windows.sh

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: C-GAMES-COLLECTION-Windows
        path: release/*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
