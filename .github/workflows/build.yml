name: CI Build and Package

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make pkg-config libgtk-4-dev xvfb cppcheck valgrind

    - name: Static Analysis
      run: cppcheck --enable=warning,performance,portability --suppress=missingIncludeSystem --error-exitcode=1 src/

    - name: Build Project
      run: make all CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 $(pkg-config --cflags gtk4)"
      
    - name: Run Tests (Memory Check)
      run: xvfb-run valgrind --leak-check=full --error-exitcode=1 ./bin/test_persistence.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: brew update && brew install gtk4 pkg-config
      
    - name: Build Project
      run: make all CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 $(pkg-config --cflags gtk4)"

    - name: Run Tests
      run: make test

  package-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-gtk4
          mingw-w64-ucrt-x86_64-pkgconf
          make
          zip

    - name: Build and Package (MSYS2)
      shell: msys2 {0}
      run: |
        # Use our packaging script natively in the MSYS2 bash environment
        bash scripts/package-windows.sh

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: C-GAMES-COLLECTION-Windows
        path: release/*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
