name: CI Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make pkg-config libgtk-4-dev xvfb

    - name: Build Project
      run: make all CFLAGS="-std=c11 -Wall -Wextra -Werror -Wpedantic -O2 $(pkg-config --cflags gtk4)"
      
    - name: Run Tests
      run: xvfb-run make test
